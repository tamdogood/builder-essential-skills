<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">validate-market skill card</title><desc id="desc">A product and market skill for testing whether an idea is viable.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#1267ba"/><stop offset="1" stop-color="#073562"/></linearGradient><pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#fff" stroke-opacity=".12" stroke-width="1"/></pattern></defs>
  <rect width="1200" height="760" fill="#f5f0e6"/><rect x="26" y="26" width="1148" height="708" rx="3" fill="url(#bg)"/><rect x="26" y="26" width="1148" height="708" fill="url(#grid)"/>
  <path d="M890 244h210M900 224l45-52 44 24 58-90 52 54" fill="none" stroke="#f5f0e6" stroke-opacity=".55" stroke-width="7"/><circle cx="945" cy="172" r="12" fill="#f5f0e6"/><circle cx="989" cy="196" r="12" fill="#f5f0e6"/><circle cx="1047" cy="106" r="12" fill="#f5f0e6"/>
  <rect x="94" y="106" width="1012" height="548" rx="34" fill="#fbfaf8" stroke="#ded9d0" stroke-width="2"/><rect x="128" y="140" width="10" height="480" rx="5" fill="#ee5963"/>
  <text x="170" y="214" fill="#142233" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">validate-market</text><text x="170" y="272" fill="#3e4855" font-family="Arial, Helvetica, sans-serif" font-size="28">Tests whether a product idea has real demand, a credible</text><text x="170" y="312" fill="#3e4855" font-family="Arial, Helvetica, sans-serif" font-size="28">position, and a worthwhile next step.</text>
  <path d="M170 350h850" stroke="#ded9d0" stroke-width="2" stroke-dasharray="8 9"/>
  <g font-family="Arial, Helvetica, sans-serif"><g fill="#815c30" font-size="16" font-weight="700" letter-spacing="2"><text x="170" y="406">CATEGORY</text><text x="170" y="458">INPUT</text><text x="170" y="510">OUTPUT</text><text x="170" y="574">RUN</text></g><g fill="#3e4855" font-size="24"><text x="390" y="406">Product &amp; market</text><text x="390" y="458">An idea, product, or market hypothesis</text><text x="390" y="510">A viability audit and validation plan</text></g><rect x="390" y="544" width="570" height="48" rx="6" fill="#f1ecdf"/><text x="410" y="576" fill="#5e482d" font-family="monospace" font-size="17">/validate-market Audit this idea's market fit.</text></g>
</svg>
