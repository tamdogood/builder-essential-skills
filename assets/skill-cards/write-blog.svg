  <text x="170" y="214" fill="#142233" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">write-blog</text><text x="170" y="272" fill="#3e4855" font-family="Arial, Helvetica, sans-serif" font-size="28">Finds a strong angle, drafts in a human voice, and helps</text><text x="170" y="312" fill="#3e4855" font-family="Arial, Helvetica, sans-serif" font-size="28">ship a blog post that earns attention.</text>
