<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">orwell-writing skill card</title><desc id="desc">A writing skill for making prose direct, specific, and free of filler.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0d71bd"/><stop offset="1" stop-color="#063b72"/></linearGradient><pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#fff" stroke-opacity=".12" stroke-width="1"/></pattern></defs>
  <rect width="1200" height="760" fill="#f5f0e6"/><rect x="26" y="26" width="1148" height="708" rx="3" fill="url(#bg)"/><rect x="26" y="26" width="1148" height="708" fill="url(#grid)"/>
  <path d="M895 88h170v172H895zM928 132h104M928 172h104M928 212h64" fill="none" stroke="#f5f0e6" stroke-opacity=".55" stroke-width="7"/>
