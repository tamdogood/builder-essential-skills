  <text x="170" y="214" fill="#142233" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">orwell-writing</text><text x="170" y="272" fill="#3e4855" font-family="Arial, Helvetica, sans-serif" font-size="28">Edits prose until it says what it means: direct, specific,</text><text x="170" y="312" fill="#3e4855" font-family="Arial, Helvetica, sans-serif" font-size="28">and free of filler.</text>
  <path d="M170 350h850" stroke="#ded9d0" stroke-width="2" stroke-dasharray="8 9"/>
  <g font-family="Arial, Helvetica, sans-serif"><g fill="#815c30" font-size="16" font-weight="700" letter-spacing="2"><text x="170" y="406">CATEGORY</text><text x="170" y="458">INPUT</text><text x="170" y="510">OUTPUT</text><text x="170" y="574">RUN</text></g><g fill="#3e4855" font-size="24"><text x="390" y="406">Writing</text><text x="390" y="458">A draft, document, message, or copy</text><text x="390" y="510">Cleaner writing that keeps your voice</text></g><rect x="390" y="544" width="510" height="48" rx="6" fill="#f1ecdf"/><text x="410" y="576" fill="#5e482d" font-family="monospace" font-size="17">/orwell-writing Rewrite this in plain English.</text></g>
