<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">code-standards skill card</title><desc id="desc">An engineering quality skill for small, tested, and reviewable code changes.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#1267ba"/><stop offset="1" stop-color="#073562"/></linearGradient><pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#fff" stroke-opacity=".12" stroke-width="1"/></pattern></defs>
  <rect width="1200" height="760" fill="#f5f0e6"/><rect x="26" y="26" width="1148" height="708" rx="3" fill="url(#bg)"/><rect x="26" y="26" width="1148" height="708" fill="url(#grid)"/>
  <path d="M918 108l-72 72 72 72M1048 108l72 72-72 72M1014 88l-36 184" fill="none" stroke="#f5f0e6" stroke-opacity=".55" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="94" y="106" width="1012" height="548" rx="34" fill="#fbfaf8" stroke="#ded9d0" stroke-width="2"/><rect x="128" y="140" width="10" height="480" rx="5" fill="#18a56d"/>
  <text x="170" y="214" fill="#142233" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">code-standards</text><text x="170" y="272" fill="#3e4855" font-family="Arial, Helvetica, sans-serif" font-size="28">Keeps an engineering change focused: understand the code,</text><text x="170" y="312" fill="#3e4855" font-family="Arial, Helvetica, sans-serif" font-size="28">make the smallest change, then prove it.</text>
  <path d="M170 350h850" stroke="#ded9d0" stroke-width="2" stroke-dasharray="8 9"/>
  <g font-family="Arial, Helvetica, sans-serif"><g fill="#815c30" font-size="16" font-weight="700" letter-spacing="2"><text x="170" y="406">CATEGORY</text><text x="170" y="458">INPUT</text><text x="170" y="510">OUTPUT</text><text x="170" y="574">RUN</text></g><g fill="#3e4855" font-size="24"><text x="390" y="406">Engineering quality</text><text x="390" y="458">A bug, feature, refactor, or code change</text><text x="390" y="510">A reviewable change with relevant checks</text></g><rect x="390" y="544" width="600" height="48" rx="6" fill="#f1ecdf"/><text x="410" y="576" fill="#5e482d" font-family="monospace" font-size="15">$code-standards Fix this bug using the project workflow.</text></g>
