<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Create Marketing Kit skill card</title>
  <desc id="desc">A dark atelier card with linked campaign frames, describing a workflow for truthful marketing copy and human-centered artwork.</desc>
  <defs>
    <linearGradient id="background" x1="80" y1="40" x2="1110" y2="730" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17141E"/>
      <stop offset="0.52" stop-color="#0B0C10"/>
      <stop offset="1" stop-color="#15110E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(940 225) rotate(138) scale(430 300)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#73598B" stop-opacity="0.38"/>
      <stop offset="0.55" stop-color="#B68B56" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#0B0C10" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brass" x1="715" y1="155" x2="1055" y2="454" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0D7A5"/>
      <stop offset="0.45" stop-color="#B88A50"/>
      <stop offset="1" stop-color="#76502E"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#background)"/>
  <rect width="1200" height="760" rx="34" fill="url(#glow)"/>
  <rect x="24" y="24" width="1152" height="712" rx="25" fill="none" stroke="#B68B56" stroke-opacity="0.42"/>
