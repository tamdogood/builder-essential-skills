  <text x="72" y="237" fill="#BDB4A9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25">Turn product truth into campaign copy, human-centered</text>
  <text x="72" y="272" fill="#BDB4A9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25">artwork, and channel-ready layouts that stay honest.</text>

